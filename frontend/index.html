<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NodeLink - Remote Server Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: white;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .content {
            padding: 30px;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
        }
        
        .status-dot.connected {
            background: #28a745;
        }
        
        .tabs {
            display: flex;
            border-bottom: 2px solid #f1f1f1;
            margin-bottom: 30px;
        }
        
        .tab {
            padding: 15px 30px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 16px;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        select, input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s ease;
            margin-right: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-danger {
            background: #dc3545;
        }
        
        .output-section {
            margin-top: 30px;
        }
        
        .output {
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .nodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .node-card {
            background: #f8f9fa;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        
        .node-card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .node-card.online {
            border-color: #28a745;
        }
        
        .node-card.offline {
            border-color: #dc3545;
        }
        
        .node-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .node-name {
            font-size: 1.2em;
            font-weight: 600;
        }
        
        .node-info {
            font-size: 0.9em;
            color: #666;
        }
        
        .tasks-list {
            margin-top: 20px;
        }
        
        .task-item {
            background: white;
            border: 1px solid #e1e5e9;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .task-info {
            flex: 1;
        }
        
        .task-id {
            font-family: monospace;
            font-size: 0.9em;
            color: #666;
        }
        
        .task-type {
            font-weight: 600;
            color: #333;
        }
        
        .task-status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .task-status.running {
            background: #fff3cd;
            color: #856404;
        }
        
        .task-status.completed {
            background: #d4edda;
            color: #155724;
        }
        
        .task-status.failed {
            background: #f8d7da;
            color: #721c24;
        }
        
        .task-status.pending {
            background: #e2e3e5;
            color: #383d41;
        }
        
        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }
        
        .refresh-btn:hover {
            transform: scale(1.1);
        }
        
        .json-output {
            background: #f8f9fa;
            border: 1px solid #e1e5e9;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            font-family: monospace;
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>NodeLink</h1>
            <p>Remote Server Management Dashboard</p>
        </div>
        
        <div class="content">
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-dot" id="connectionStatus"></div>
                    <span id="connectionText">Disconnected</span>
                </div>
                <div class="status-item">
                    <span>Nodes: <strong id="nodeCount">0</strong></span>
                </div>
                <div class="status-item">
                    <span>Tasks: <strong id="taskCount">0</strong></span>
                </div>
            </div>
            
            <div class="tabs">
                <button class="tab active" onclick="showTab('nodes')">Nodes</button>
                <button class="tab" onclick="showTab('tasks')">Tasks</button>
                <button class="tab" onclick="showTab('shell')">Shell</button>
                <button class="tab" onclick="showTab('docker')">Docker</button>
                <button class="tab" onclick="showTab('system')">System</button>
            </div>
            
            <div id="nodes-tab" class="tab-content active">
                <h3>Connected Nodes</h3>
                <div id="nodesGrid" class="nodes-grid"></div>
            </div>
            
            <div id="tasks-tab" class="tab-content">
                <h3>Task Management</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Filter by Node:</label>
                        <select id="taskNodeFilter">
                            <option value="">All Nodes</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Filter by Status:</label>
                        <select id="taskStatusFilter">
                            <option value="">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="running">Running</option>
                            <option value="completed">Completed</option>
                            <option value="failed">Failed</option>
                        </select>
                    </div>
                </div>
                <div id="tasksList" class="tasks-list"></div>
            </div>
            
            <div id="shell-tab" class="tab-content">
                <h3>Shell Command Execution</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Select Node:</label>
                        <select id="shellNodeSelect">
                            <option value="">Select a node...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Working Directory:</label>
                        <input type="text" id="shellCwd" placeholder="/home/user">
                    </div>
                </div>
                <div class="form-group">
                    <label>Command:</label>
                    <input type="text" id="shellCommand" placeholder="ls -la">
                </div>
                <div class="form-group">
                    <label>Timeout (ms):</label>
                    <input type="number" id="shellTimeout" value="30000">
                </div>
                <button class="btn" onclick="executeShellCommand()">Execute Command</button>
            </div>
            
            <div id="docker-tab" class="tab-content">
                <h3>Docker Management</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Select Node:</label>
                        <select id="dockerNodeSelect">
                            <option value="">Select a node...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Action:</label>
                        <select id="dockerAction" onchange="updateDockerForm()">
                            <option value="docker.list">List Containers</option>
                            <option value="docker.start">Start Container</option>
                            <option value="docker.stop">Stop Container</option>
                        </select>
                    </div>
                </div>
                <div id="dockerForm"></div>
                <button class="btn" onclick="executeDockerAction()">Execute Action</button>
            </div>
            
            <div id="system-tab" class="tab-content">
                <h3>System Information</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Select Node:</label>
                        <select id="systemNodeSelect">
                            <option value="">Select a node...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Action:</label>
                        <select id="systemAction">
                            <option value="system.info">System Information</option>
                            <option value="system.health">Health Check</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="includeMetrics" checked> Include Metrics
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="includeProcesses"> Include Processes
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="includeNetwork"> Include Network
                    </label>
                </div>
                <button class="btn" onclick="executeSystemAction()">Execute Action</button>
            </div>
            
            <div class="output-section">
                <h3>Output</h3>
                <div id="output" class="output">Ready to execute commands...</div>
            </div>
        </div>
    </div>
    
    <button class="refresh-btn" onclick="refreshData()" title="Refresh Data">
        🔄
    </button>
    
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
